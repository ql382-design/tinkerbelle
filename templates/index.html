<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shake Control</title>

  <!-- CSS -->
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

  <!-- Pickr Color Picker -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/themes/classic.min.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@simonwep/pickr/dist/pickr.min.js"></script>
</head>
<body>
  <!-- Control Panel -->
  <div id="controlPanel">
    <p><b>Control Panel</b></p>

    <!-- Color Picker -->
    <div class="pickr"></div>

    <!-- Sliders -->
    <label>Shake Strength</label>
    <input type="range" id="shakeStrength" min="1" max="10" value="4">

    <label>Brightness (%)</label>
    <input type="range" id="brightness" min="50" max="150" value="130">

    <!-- Quick buttons -->
    <div>
      <button id="lightMode">Light</button>
      <button id="mediumMode">Medium</button>
      <button id="strongMode">Strong</button>
    </div>

    <!-- Shake toggle -->
    <div>
      <button onclick="startShaking()">Start Shake</button>
      <button onclick="stopShaking()">Stop Shake</button>
    </div>
  </div>

  <!-- Script -->
  <script src="{{ url_for('static', filename='index.js') }}"></script>
</body>
</html>
